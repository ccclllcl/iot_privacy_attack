# 物联网隐私攻击实验 — 默认配置（路径与超参数集中管理，避免硬编码）

# -------------------- 可复现性（全局随机种子） --------------------
# 全项目统一入口：预处理划分、训练、防御 RNG、generate_mock_data（--config）等均读取此值。
experiment:
  random_seed: 42

# -------------------- 路径 --------------------
paths:
  # 原始 CSV（请将 Smart* 或自造数据放在此路径）
  raw_csv: data/raw/smart_home_events.csv
  processed_dir: data/processed
  defended_dir: data/defended
  models_dir: outputs/models
  figures_dir: outputs/figures
  reports_dir: outputs/reports
  defense_dir: outputs/defense

# -------------------- CSV 列名映射（字段不一致时只改这里） --------------------
columns:
  timestamp: timestamp
  device_id: device_id
  # 数值列：功耗或传感器读数；若无则填 null 并在预处理中用 0/事件计数代替
  value: value
  # 离散状态：on/off、1/0 等；若无则填 null
  state: state
  # 若原始数据已有行为标签列，填写列名；否则用规则生成标签
  label: behavior_label

# -------------------- 预处理 --------------------
preprocess:
  # 重采样时间步长，pandas 频率字符串，如 "1min", "5min", "10min"
  freq: 5min
  # 缺失值：ffill / bfill / zero / drop_rows
  fill_method: ffill
  # 异常值：none / iqr / zscore_clip
  outlier_method: iqr
  iqr_multiplier: 1.5
  zscore_limit: 3.0
  # 滑窗
  seq_len: 12
  window_stride: 1
  # 划分比例（三者之和应为 1.0）
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15
  # 是否在预处理阶段为 MLP 预计算统计特征并保存
  save_mlp_features: true

# -------------------- 行为标签 --------------------
label_mapping:
  # column: 使用 CSV 中已有标签列（见 columns.label）
  # rules: 无标签时按规则生成（可扩展替换为人工标注接口）
  source: column
  # 类别顺序需与训练时一致（编码 0..C-1）
  classes:
    - sleep
    - away
    - cooking
    - using_computer
    - other
  # 规则版示例：按「窗口内主导小时 + 设备活动模式」推断（详见 preprocess.LabelRuleEngine）
  rules:
    sleep:
      hour_ranges: [[22, 24], [0, 7]]
      max_mean_activity: 0.35
    away:
      hour_ranges: [[8, 18]]
      max_mean_activity: 0.15
      max_peak_power: 0.25
    cooking:
      hour_ranges: [[11, 14], [17, 20]]
      min_kitchen_ratio: 0.2
      min_mean_activity: 0.2
    using_computer:
      hour_ranges: [[9, 23]]
      min_computer_ratio: 0.25
      min_mean_activity: 0.25

# -------------------- 设备分组（用于规则标签与特征命名） --------------------
device_groups:
  kitchen_devices:
    - kitchen_light
    - kitchen_microwave
    - kitchen_fridge
  computer_devices:
    - office_pc
    - desk_lamp
    - monitor_power
  motion_devices:
    - living_motion
    - bedroom_motion

# -------------------- 特征工程（MLP / 传统模型） --------------------
features:
  include_raw_shape: false
  per_channel:
    use_count: true
    use_mean: true
    use_max: true
    use_min: true
    use_std: true
    use_change_count: true
  global:
    active_device_count: true
    total_energy_proxy: true
    mean_power_proxy: true
    peak_power_proxy: true

# -------------------- 训练 --------------------
train:
  model_type: lstm
  batch_size: 64
  num_epochs: 80
  learning_rate: 0.001
  weight_decay: 0.0001
  dropout: 0.3
  lstm_hidden_size: 128
  lstm_num_layers: 2
  mlp_hidden_sizes: [256, 128]
  early_stopping_patience: 10
  early_stopping_min_delta: 0.0001
  num_workers: 0
  use_class_weights: true
  device: auto

# -------------------- 评估 --------------------
evaluate:
  batch_size: 128
  num_workers: 0
  device: auto

# -------------------- 数据防御 / 扰动 --------------------
defense:
  enabled: true
  # noise | ldp | adaptive_ldp（毕设默认：自适应本地 DP + 边缘预算裁剪仿真）
  method: adaptive_ldp
  # fixed_attacker / retrain_attacker 由命令行 run_defense_eval 指定；此处可写默认供文档参考
  mode: fixed_attacker
  epsilon: 1.0
  ldp_sensitivity: 1.0
  noise_type: laplace
  noise_scale: 0.5
  # all: 全特征；selected: 仅 selected_features 列
  apply_to: all
  selected_features:
    - kitchen_light
    - office_pc
    - bedroom_motion
  # 二值特征（>binary_threshold 视为 1）使用随机响应；其余数值列使用 Laplace
  binary_threshold: 0.5
  binary_features: []
  # null：除 binary_features 外所有列使用 Laplace；[]：显式「无数值列加噪」；非空列表：仅列出的列 Laplace
  numeric_features: null

# 自适应本地差分隐私（与 defense.method: adaptive_ldp 配套）
# 敏感度：窗口内时序 std；流量代理：窗口 L1 能量和。二者归一化后加权得到风险，风险高则 epsilon 小（噪声强）。
# 边缘辅助：可选对 sum(1/epsilon_i) 做上界裁剪（启发式调度，非形式化合成定理）。
adaptive_ldp:
  epsilon_min: 0.4
  epsilon_max: 4.0
  weight_sensitivity: 0.5
  weight_traffic: 0.5
  calibration_percentile_low: 5
  calibration_percentile_high: 95
  use_edge_budget_cap: false
  # 若开启：当 sum_i(1/eps_i) 超过该上界时整体放大各窗 epsilon（满足总约束，见 src/edge/budget_allocator.py）
  edge_inverse_budget_cap: 100000

# 防御评估辅助（重训攻击者时保存的模型文件名）
defense_eval:
  retrained_model_name: best_lstm_defended_retrain.pt

# 批量对比实验（run_compare.py）
compare:
  ldp_epsilon_list: [0.1, 0.5, 1.0, 2.0, 5.0]
  noise_scale_list: [0.1, 0.3, 0.5, 1.0]
